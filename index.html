<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>투자 랜덤런 - 시즌 2</title>
    <style>
        body { background: #121212; color: white; font-family: 'Malgun Gothic', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #444; }
        #seed-input { background: transparent; border: none; border-bottom: 2px solid #f1c40f; color: #f1c40f; font-size: 1.5rem; width: 180px; text-align: right; outline: none; }
        .investment-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #2a2a2a; border-radius: 15px; padding: 15px; border: 1px solid #333; text-align: center; }
        .brand-img { width: 100%; height: 200px; object-fit: contain; background: #000; border-radius: 10px; border: 1px solid #444; }
        .result-desc { color: #aaa; font-size: 0.95rem; margin: 15px 0; min-height: 45px; line-height: 1.4; }
        .percent-tag { color: #2ecc71; font-weight: bold; font-size: 1.2rem; margin-bottom: 10px; }
        .input-box { width: 80%; padding: 10px; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 5px; text-align: center; }
        .info-section { margin-top: 30px; padding: 20px; background: #1e1e1e; border-radius: 15px; }
        .info-btn { display: none; background: #d35400; color: white; border: none; padding: 10px 15px; margin: 5px; border-radius: 5px; cursor: pointer; }
        .action-btn { width: 100%; height: 60px; font-size: 1.3rem; font-weight: bold; margin-top: 20px; border-radius: 10px; cursor: pointer; border: none; background: #f1c40f; color: black; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>회차: <span id="turn-text">1</span> / 7</h2>
        <div>보유 점수: <input type="number" id="seed-input" value="1000000"> ₩</div>
    </div>

    <div id="grid" class="investment-grid"></div>

    <div class="info-section">
        <h3>📂 이번 회차 획득 정보 (클릭 시 확인)</h3>
        <div id="info-btns"></div>
    </div>

    <button id="main-btn" class="action-btn" onclick="handleAction()">1회차 결과 보기</button>
</div>

<script>
    let turn = 1;
    let mode = "INPUT"; 
    let seed = 1000000;

    // ★ 가람님 스펙: id에 1~4번 고정 로고 이미지 매핑
    const companies = [
        { id: '1', name: '디노다스', base: 4 },     // 뉴스 시작 번호 5 전 단계 (base 4 + turn 1 = 5)
        { id: '2', name: '스페이스엠엘', base: 11 }, // 뉴스 시작 번호 12 전 단계 (base 11 + turn 1 = 12)
        { id: '3', name: '감샐푸드', base: 18 },    // 뉴스 시작 번호 19 전 단계 (base 18 + turn 1 = 19)
        { id: '4', name: '요정바이오', base: 25 }   // 뉴스 시작 번호 26 전 단계 (base 25 + turn 1 = 26)
    ];

    const pdfFiles = [
        "디노다스 기사.pdf", "주주게시판.pdf", "!스페이스엠엘!.pdf",
        "인스타.pdf", "긴급 안내.pdf", "블라인드.pdf", "리포트 일부 .pdf"
    ];

    // ★ 가람님이 지정하신 png.5 ~ png.32 번호와 완벽하게 일치시킨 데이터셋
    const rData = {
        // 디노다스 (5~11)
        5: { desc: "디노다스 신상 컬렉션 출시 첫날 오픈런…매장 앞 수천 명 몰려", per: 10 },
        6: { desc: "아이돌 '커피맛 쿠키' 착용 효과…디노다스, 글로벌 품절 대란", per: 15 },
        7: { desc: "디노다스 '스노우브로' 티셔츠 표절 의혹…원작 브랜드와 법적 공방 예고", per: -10 },
        8: { desc: "디노다스, 뒷광고·품질 논란 확산…소비자 신뢰 흔들", per: -8 },
        9: { desc: "디노다스, 세계 패션위크 메인 무대 입성…글로벌 브랜드 도약 신호탄", per: 18 },
        10: { desc: "패션업계 비수기 직격탄…디노다스, 재고 부담에 할인 판매 확대", per: -5 },
        11: { desc: "'신상 너무 많다'…디노다스 과도한 신제품 전략에 소비자 피로감 커져", per: -10 },

        // 스페이스엠엘 (12~18)
        12: { desc: "스페이스엠엘, 국방부 차세대 발사체 성능평가 탈락…군 사업 수주 '빨간불'", per: -7 },
        13: { desc: "스페이스엠엘, 중동 대형 우주·방산 계약 체결…10조 원 규모 수출 성사", per: 18 },
        14: { desc: "스페이스엠엘 핵심 기술 해외 유출 의혹…수사기관 조사 착수", per: -11 },
        15: { desc: "스페이스엠엘, 민간 우주선 발사 성공…국내 우주산업 새 이정표", per: 14 },
        16: { desc: "스페이스엠엘, 방산 비리 의혹에 세무조사까지…경영 리스크 확대", per: -15 }, // 5회차 스와프 대상
        17: { desc: "스페이스엠엘, 글로벌 우주정거장 프로젝트 합류…국제 우주개발 핵심 파트너로", per: 10 }, // 6회차 스와프 대상
        18: { desc: "스페이스엠엘, 세계 최초 유인 화성 착륙 성공…우주 탐사 역사 새로 썼다", per: 15 },

        // 감샐푸드 (19~25)
        19: { desc: "감샐푸드, 글로벌 품절 사태에 생산라인 풀가동…공장 증설 투자 결정", per: 8 },
        20: { desc: "'감샐빵 챌린지' 숏폼 열풍…감샐푸드, 역대급 매출 신기록", per: 16 },
        21: { desc: "기후변화 직격탄…감샐푸드, 원자재 수급난에 생산 차질 우려", per: -8 },
        22: { desc: "'억지 바이럴' 역풍 맞은 감샐푸드…트렌드 급랭에 판매량 감소", per: -10 },
        23: { desc: "감샐푸드, 이물질 검출 루머 확산…선제적 전량 리콜로 소비자 불안 진화", per: -5 },
        24: { desc: "감샐푸드, 미국 식품 규제 당국 조사서 혐의 벗어…대규모 손해배상 소송도 승소", per: 12 },
        25: { desc: "감샐푸드 해외 생산기지 대규모 파업…납기 지연에 공급망 비상", per: -20 },

        // 요정바이오 (26~32)
        26: { desc: "요정바이오, 임상 1상 데이터 유출 의혹 제기…보안 관리 도마 위", per: -8 },
        27: { desc: "'식약처 압수수색' 찌라시 확산…요정바이오 \"사실무근\" 해명", per: -12 },
        28: { desc: "요정바이오, 조사 결과 무혐의…신약 후보물질 임상 1상도 승인 획득", per: 12 },
        29: { desc: "요정바이오, 글로벌 빅파마와 수조 원 규모 라이선스 아웃 계약 체결", per: 20 },
        30: { desc: "요정바이오, 임상 2상서 원인 불명 이상반응 발생…안전성 우려 확산", per: -18 },
        31: { desc: "\"부작용 아닌 일시적 유전자 활성화\"…요정바이오, 정밀 분석 결과 공개", per: 11 },
        32: { desc: "요정바이오, 임상 3상 성공·전 세계 시판 허가 획득…차세대 블록버스터 신약 탄생", per: 18 }
    };

    function init() {
        const grid = document.getElementById('grid');
        const infoContainer = document.getElementById('info-btns');
        
        companies.forEach(c => {
            grid.innerHTML += `
                <div class="card">
                    <!-- 처음 로드 시 1.png ~ 4.png 노출 -->
                    <img id="img-${c.id}" src="${c.id}.png" class="brand-img" alt="${c.name} 로고">
                    <h3>${c.name}</h3>
                    <div id="desc-${c.id}" class="result-desc">투자 금액을 입력하세요.</div>
                    <div id="per-${c.id}" class="percent-tag"></div>
                    <input type="number" id="inv-${c.id}" class="input-box" placeholder="금액 입력">
                </div>`;
        });

        pdfFiles.forEach((file, idx) => {
            infoContainer.innerHTML += `<button class="info-btn" id="info-${idx+1}" onclick="window.open('${encodeURIComponent(file)}', '_blank')">📄 정보 ${idx+1}</button>`;
        });

        updateInfoDisplay();
    }

    function updateInfoDisplay() {
        const currentBtn = document.getElementById(`info-${turn}`);
        if(currentBtn) currentBtn.style.display = "inline-block";
    }

    function handleAction() {
        if (mode === "INPUT") showResult();
        else prepareNext();
    }

    function showResult() {
        seed = parseInt(document.getElementById('seed-input').value) || 0;
        let totalGain = 0;

        companies.forEach(c => {
            let rNum = c.base + turn;

            // ★ 가람님 전용 스페이스엠엘(id: '2') 5, 6회차 변칙 스와프 조건 완벽 처리
            if (c.id === '2') {
                if (turn === 5) rNum = 17;      // 5회차 결과 때 png.17 (우주정거장) 출력
                else if (turn === 6) rNum = 16; // 6회차 결과 때 png.16 (세무조사) 출력
            }

            const invest = parseInt(document.getElementById(`inv-${c.id}`).value) || 0;
            const data = rData[rNum];

            // 결과 화면 전환 시 png.5 ~ png.32 진짜 뉴스 이미지로 교체
            document.getElementById(`img-${c.id}`).src = `${rNum}.png`;
            document.getElementById(`desc-${c.id}`).innerText = data.desc;
            document.getElementById(`per-${c.id}`).innerText = (data.per >= 0 ? "+" : "") + data.per + "%";
            
            seed -= invest;
            totalGain += invest * (1 + data.per / 100);
        });

        seed = Math.floor(seed + totalGain);
        document.getElementById('seed-input').value = seed;
        
        const mainBtn = document.getElementById('main-btn');
        mainBtn.innerText = (turn < 7) ? (turn + 1) + "회차 준비하기" : "투자 종료 (최종 점수 확인)";
        mode = "RESULT";
    }

    function prepareNext() {
        if (turn >= 7) return;
        turn++;
        document.getElementById('turn-text').innerText = turn;
        updateInfoDisplay();

        companies.forEach(c => {
            // 다음 회차 준비 단계로 돌아갈 때 다시 기본 로고 1.png ~ 4.png로 복구
            document.getElementById(`img-${c.id}`).src = `${c.id}.png`;
            document.getElementById(`desc-${c.id}`).innerText = "투자 금액을 입력하세요.";
            document.getElementById(`per-${c.id}`).innerText = "";
            document.getElementById(`inv-${c.id}`).value = "";
        });

        document.getElementById('main-btn').innerText = turn + "회차 결과 보기";
        mode = "INPUT";
    }

    window.onload = init;
</script>
</body>
</html>
